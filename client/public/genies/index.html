<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AI Genie Team | AI Leverage Lab</title>
    <meta
      name="description"
      content="Meet the AI Genie Team and explore the integrations that keep your business moving around the clock."
    />
    <link rel="canonical" href="https://aileveragelab.pro/genies/" />
    <meta property="og:title" content="AI Genie Team | AI Leverage Lab" />
    <meta
      property="og:description"
      content="Explore the AI Genie Team integrations for always-on sales, recruiting, and business execution."
    />
    <meta property="og:url" content="https://aileveragelab.pro/genies/" />
    <meta name="theme-color" content="#04070f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Orbitron:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./genie-app.css" />
    <link rel="stylesheet" href="./compact-overrides.css" />
    <script type="module" src="./genie-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p style="margin: 0; padding: 2rem; color: #d7fff6; background: #04070f; font-family: system-ui, sans-serif;">
        JavaScript is required to open the AI Genie Team experience.
      </p>
    </noscript>
    <script>
      /* Keep the approved internal design intact while making the brand lockup an escape route to the main Lab. */
      document.addEventListener(
        "click",
        (event) => {
          const brand = event.target.closest('a[aria-label="AI Genie Blueprint home"]');
          if (!brand) return;
          event.preventDefault();
          window.location.assign("/");
        },
        true,
      );
    </script>
  </body>
</html>
